<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Circle3 Paper</title>
    <meta http-equiv="refresh" content="2;url={{ '/assets/pdfs/circle3-paper.pdf' | relative_url }}">
  </head>
  <body>
    <p>If your download doesn’t start, <a id="dl" href="{{ '/assets/pdfs/circle3-paper.pdf' | relative_url }}" download>click here to download the Circle3 paper</a>.</p>
    <script>
      (function () {
        var url = document.getElementById('dl').href;

        var a = document.createElement('a');
        a.href = url;
        a.setAttribute('download', '');
        document.body.appendChild(a);
        a.click();

        // Fallback: if the browser ignores "download", at least open the PDF
        setTimeout(function () { window.location.href = url; }, 500);
      })();
    </script>
  </body>
</html>
