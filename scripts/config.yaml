framing:
  title: Circle3
  subtitle: A Pattern Language for Leading Change in Complex Environments
  images:
    - images/full/index.png
    - images/full/method.png
  abstract_label: Abstract
  toc_label: Table of Contents
  abstract: |
    In complex, change-saturated environments, initiatives often stall not because people don’t care—but because they are operating from different interpretations of what is happening. Priorities compete, conversations fragment, and decisions don’t hold long enough to become practice.

    Circle3™ is a compact pattern language for restoring coherence under these conditions. It offers three interlocking moves—**Establish the Circle**, **Balance the Conversation**, and **Reconcile the Intention**—that help a group form shared perception, work tension productively, and translate emerging clarity into commitments that stick.

    This paper presents the moves alongside three Leadership Lenses (sense-making, energy awareness, and session intention) that sharpen how leaders and facilitators notice what is shaping a situation. The patterns can be used independently and started in any order, but they are designed to function as a mutually reinforcing set.

conclusion:
  title: Origin and Ongoing Evolution
  anchor: origin
  image: images/full/origin.png

  main_text: |
    Circle3 did not begin as a framework.
    
    These moves emerged from repeated experience in real change efforts—especially where pressure fragmented attention, meaning, and coordination—and coherence had to be rebuilt from lived conditions.
    
    If you want the deeper context—where these patterns came from, what shaped them, and how they continue to evolve—read the Origin Story.

  cta_text: "Read the Origin Story:"
  cta_url: https://circle.basil.one/origin/
  cta_label: https://circle.basil.one/origin