paper:
  introduction_label: Introduction
  introduction_anchor: introduction
  include_introduction_in_toc: true
  introduction: |
    ## Introduction

    This paper is a workshop submission to PLoP/PLoPCon. It presents Circle3™, a compact pattern language for leading change when progress is constrained less by effort or expertise and more by fragmented interpretation, scattered attention, and misaligned intention.

    The paper includes Three Guiding Moves™ (patterns) and Three Leadership Lenses™ (reflective exercises). The Moves describe repeatable configurations that help groups make change clearer and more aligned; the Lenses support facilitation by sharpening what leaders notice in real time.

    ### Audience and boundaries

    Circle3 is aimed at leaders, facilitators, and change agents working across teams and roles—especially when a change effort is widely discussed but shared understanding and durable commitments are not forming.

    Circle3 is not a replacement for governance, program management, organizational design, or incident response. Its purpose is narrower: create enough coherence that decisions and commitments hold beyond a single meeting.

    ### How to read and use the language

    A typical progression is:

    1. Establish the Circle — form a recurring nucleus where coherence can develop
    2. Balance the Conversation — keep conversation generative under tension and time pressure
    3. Reconcile the Intention — anchor alignment through an artifact and iterative conversation

    The Lenses are optional supports that can be used before sessions (preparation) and between sessions (diagnosis of drift).

    ### Feedback requested at the writers’ workshop

    Feedback is requested on:

    1. Pattern quality: are the Forces credible, and do the solutions read as repeatable patterns grounded in use?
    2. Language design: do the three Moves form a coherent minimum language with clear relationships and sequencing?
    3. Fit and presentation: do the Lenses belong in this submission, and is the paper framed clearly for a PLoP/PLoPCon workshop?

