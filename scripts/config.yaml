framing:
  title: Circle3
  subtitle: A Pattern Language for Leading Change in Complex Environments
  images:
    - images/full/index.png
    - images/full/method.png
  abstract_label: Abstract
  toc_label: Table of Contents
  abstract: |
    Change initiatives often stall because people are not working from the same understanding of what is happening.
    Priorities compete, conversations fragment, and decisions don’t hold long enough to become practice.

    Circle3™ is a compact pattern language for restoring coherence in complex environments.
    This paper presents three interlocking moves—**Establish the Circle**, **Balance the Conversation**, and **Reconcile the Intention**—
    that help a group form shared perception, work tension productively, and translate emerging clarity into commitments.

    The moves can be started in any order, but they are designed to function as a set.

conclusion:
  title: Origin and Ongoing Evolution
  anchor: origin
  image: images/full/origin.png

  main_text: |
    Circle3 did not begin as a framework.
    These moves emerged from repeated experience in real change efforts—especially where pressure fragmented attention,
    meaning, and coordination—and coherence had to be rebuilt from lived conditions.

  details: |
    The Origin Story connects the patterns in this paper to the situations that produced them, and to the broader Circle3 language:

    - Three Guiding Moves™
    - Three Leadership Lenses™
    - Ongoing evolution through practice
  cta_text: "Read the Origin Story:"
  cta_url: https://circle.basil.one/origin/
